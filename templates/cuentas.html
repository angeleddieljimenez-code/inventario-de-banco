<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Cuentas Bancarias
    </title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <h1>
        Cuentas Bancarias
    </h1>

    <nav>

        <a href="/dashboard">
            Dashboard
        </a>

        <a href="/usuarios">
            Usuarios
        </a>

        <a href="/inventario">
            Inventario
        </a>

        <a href="/movimientos">
            Movimientos
        </a>

        <a href="/logout">
            Cerrar sesión
        </a>

    </nav>

</header>

<!-- CREAR CUENTA -->

<section class="form-section">

    <h2>
        Crear Cuenta
    </h2>

    <form action="/crear_cuenta" method="POST">

        <input
        type="text"
        name="cliente"
        placeholder="Cliente"
        required>

        <input
        type="number"
        name="saldo"
        placeholder="Saldo Inicial"
        required>

        <button type="submit">
            Crear Cuenta
        </button>

    </form>

</section>

<!-- BUSCADOR -->

<section class="form-section">

    <h2>
        Buscar Cuenta
    </h2>

    <form action="/cuentas" method="GET">

        <input
        type="text"
        name="buscar"
        placeholder="Buscar cliente">

        <button type="submit">
            Buscar
        </button>

    </form>

</section>

<!-- TRANSFERENCIAS -->

<section class="form-section">

    <h2>
        Transferir Dinero
    </h2>

    <form action="/transferir" method="POST">

        <input
        type="number"
        name="origen"
        placeholder="ID Origen"
        required>

        <input
        type="number"
        name="destino"
        placeholder="ID Destino"
        required>

        <input
        type="number"
        name="cantidad"
        placeholder="Cantidad"
        required>

        <button type="submit">
            Transferir
        </button>

    </form>

</section>

<!-- TARJETAS -->

<section class="usuarios">

    <h2>
        Cuentas Registradas
    </h2>

    {% for cuenta in cuentas %}

    <div class="tarjeta-banco">

        <div class="tarjeta-top">

            <h3>
                BANK INVENTORY
            </h3>

            <span>
                VISA
            </span>

        </div>

        <div class="chip"></div>

        <div class="numero-tarjeta">

            {{ cuenta[3] }}

        </div>

        <div class="tarjeta-info">

            <div>

                <p>
                    Cliente
                </p>

                <strong>
                    {{ cuenta[1] }}
                </strong>

            </div>

            <div>

                <p>
                    Saldo
                </p>

                <strong>
                    ${{ cuenta[2] }}
                </strong>

            </div>

        </div>

        <div class="tarjeta-bottom">

            <div>

                <p>
                    Vence
                </p>

                <strong>
                    12/30
                </strong>

            </div>

            <div>

                <p>
                    CVV
                </p>

                <strong>
                    123
                </strong>

            </div>

        </div>

        <div class="acciones">

            <a href="/eliminar_cuenta/{{ cuenta[0] }}">

                <button>
                    Eliminar Cuenta
                </button>

            </a>

        </div>

    </div>

    {% endfor %}

</section>

</body>

</html>
