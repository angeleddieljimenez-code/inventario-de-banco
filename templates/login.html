<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>Iniciar Sesión</h1>

        <form method="POST">

            <input
            type="text"
            name="usuario"
            placeholder="Usuario"
            required>

            <input
            type="password"
            name="password"
            placeholder="Contraseña"
            required>

            <button type="submit">
                Entrar
            </button>

        </form>

    </div>

</div>

</body>

</html>
