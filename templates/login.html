<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <h1>Iniciar Sesión</h1>

            <form>

                <input
                type="text"
                placeholder="Usuario">

                <input
                type="password"
                placeholder="Contraseña">

                <button>
                    Entrar
                </button>

            </form>

        </div>

    </div>

</body>

</html>
