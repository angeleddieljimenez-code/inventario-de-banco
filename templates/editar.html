<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Editar Usuario</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <h1>Editar Usuario</h1>

    <nav>
        <a href="/usuarios">
            Volver
        </a>
    </nav>

</header>

<section class="form-section">

    <h2>Actualizar Usuario</h2>

    <form
    action="/actualizar/{{ usuario[0] }}"
    method="POST">

        <input
        type="text"
        name="nombre"
        value="{{ usuario[1] }}"
        required>

        <input
        type="email"
        name="correo"
        value="{{ usuario[2] }}"
        required>

        <button type="submit">
            Guardar Cambios
        </button>

    </form>

</section>

</body>

</html>
