<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Dashboard Bancario
    </title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <h1>
        Dashboard Bancario
    </h1>

    <nav>

        <a href="/dashboard">
            Inicio
        </a>

        <a href="/usuarios">
            Usuarios
        </a>

        <a href="/inventario">
            Inventario
        </a>

        <a href="/cuentas">
            Cuentas
        </a>

        <a href="/movimientos">
            Movimientos
        </a>

        <a href="/logout">
            Cerrar sesión
        </a>

    </nav>

</header>

<section class="dashboard">

    <h2>
        Bienvenido al Sistema Bancario
    </h2>

    <div class="dashboard-cards">

        <div class="dashboard-card">

            <h3>
                Usuarios
            </h3>

            <p>
                {{ total_usuarios }}
            </p>

        </div>

        <div class="dashboard-card">

            <h3>
                Cuentas
            </h3>

            <p>
                {{ total_cuentas }}
            </p>

        </div>

        <div class="dashboard-card">

            <h3>
                Dinero Total
            </h3>

            <p>
                ${{ total_dinero }}
            </p>

        </div>

        <div class="dashboard-card">

            <h3>
                Movimientos
            </h3>

            <p>
                {{ total_movimientos }}
            </p>

        </div>

    </div>

</section>

</body>

</html>
