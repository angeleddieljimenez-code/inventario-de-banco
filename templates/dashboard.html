<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <h1>Dashboard Bancario</h1>

    <nav>

        <a href="/">
            Inicio
        </a>

        <a href="/usuarios">
            Usuarios
        </a>

        <a href="/inventario">
            Inventario
        </a>

        <a href="/reportes">
            Reportes
        </a>

        <a href="/logout">
            Cerrar sesión
        </a>

    </nav>

</header>

<section class="dashboard">

    <h2>
        Bienvenido al Panel Administrativo
    </h2>

    <div class="dashboard-cards">

        <div class="dashboard-card">

            <h3>
                Usuarios Registrados
            </h3>

            <p>
                {{ total_usuarios }}
            </p>

        </div>

        <div class="dashboard-card">

            <h3>
                Estado del Sistema
            </h3>

            <p>
                Activo
            </p>

        </div>

        <div class="dashboard-card">

            <h3>
                Seguridad
            </h3>

            <p>
                Protegido
            </p>

        </div>

    </div>

</section>

</body>

</html>
