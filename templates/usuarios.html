<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Usuarios</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <h1>Usuarios Bancarios</h1>

    <nav>

        <a href="/dashboard">
            Dashboard
        </a>

        <a href="/inventario">
            Inventario
        </a>

        <a href="/cuentas">
            Cuentas
        </a>

        <a href="/movimientos">
            Movimientos
        </a>

        <a href="/logout">
            Cerrar sesión
        </a>

    </nav>

</header>

<!-- FORMULARIO -->

<section class="form-section">

    <h2>
        Agregar Usuario
    </h2>

    <form action="/agregar" method="POST">

        <input
        type="text"
        name="nombre"
        placeholder="Nombre"
        required>

        <input
        type="email"
        name="correo"
        placeholder="Correo"
        required>

        <button type="submit">
            Guardar
        </button>

    </form>

</section>

<!-- USUARIOS -->

<section class="usuarios">

    <h2>
        Usuarios Registrados
    </h2>

    {% for usuario in usuarios %}

        <div class="usuario-card">

            <h3>
                {{ usuario[1] }}
            </h3>

            <p>
                {{ usuario[2] }}
            </p>

            <a href="/eliminar_usuario/{{ usuario[0] }}">

                <button>
                    Eliminar
                </button>

            </a>

        </div>

    {% endfor %}

</section>

</body>

</html>
